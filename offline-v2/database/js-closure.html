<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>學習筆記：JavaScript 閉包</title>
  <meta name="description" content="閉包是 JS 最強大也最容易搞混的概念之一">
  <meta name="tags" content="程式,JavaScript,學習">
</head>
<body style="font-family:system-ui;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.8;color:#1a1a2e;">
  <h1>JavaScript 閉包 (Closure)</h1>
  <p>閉包 = 函數 + 它被建立時的詞法環境。</p>
  <pre style="background:#f5f5f5;padding:16px;border-radius:8px;overflow-x:auto"><code>function outer() {
  let count = 0;
  return function inner() {
    count++;
    return count;
  };
}
const counter = outer();
console.log(counter()); // 1
console.log(counter()); // 2</code></pre>
</body>
</html>
