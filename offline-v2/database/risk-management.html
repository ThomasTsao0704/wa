<!DOCTYPE html>

  <title>風險管理基礎</title>
  <meta name="description" content="每次交易只冒總資金 1-2% 的風險">
  <meta name="tags" content="交易,風控,策略">
</head>
<body style="font-family:system-ui;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.8;color:#1a1a2e;">
  <h1>風險管理基礎</h1>
  <p>風控不是限制獲利，而是確保你能留在場上。</p>
  <h2>1% 法則</h2>
  <p>單筆交易最多虧損總資金的 1%。如果你有 100 萬，一筆最多虧 1 萬。</p>
